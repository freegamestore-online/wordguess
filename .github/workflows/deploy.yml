name: Deploy to R2

# FreeGameStore deployment
# Builds and publishes using the official CLI
# Requires FGS_TOKEN repository secret

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.repository }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install
        working-directory: web
        run: pnpm install

      - name: Build
        working-directory: web
        run: pnpm build

      - name: Check Compliance
        working-directory: web
        run: npx -y @freegamestore/cli@latest check

      - name: Verify build output
        run: |
          test -d ./web/dist || { echo "::error::No build output at web/dist"; exit 1; }
          test -n "$(ls -A ./web/dist)" || { echo "::error::web/dist is empty"; exit 1; }

      - name: Publish to FreeGameStore
        env:
          FGS_TOKEN: ${{ secrets.FGS_TOKEN }}
        working-directory: web
        run: |
          npx -y @freegamestore/cli@latest publish
